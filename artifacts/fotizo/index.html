<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <title>Fotizo — Global marketplace for premium products &amp; services</title>
    <meta name="description" content="Fotizo is a global marketplace to buy premium products, hire vetted professionals, and grow your business across the UK, USA and Ghana." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Fotizo — Global marketplace for premium products & services" />
    <meta property="og:description" content="Buy premium products, hire vetted professionals, and grow your business — across borders." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fotizo — Global marketplace for premium products & services" />
    <meta name="twitter:description" content="Buy premium products, hire vetted professionals, and grow your business — across borders." />
    <meta name="twitter:image" content="/opengraph.jpg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preload" as="image" href="/fotizo-logo.webp" />
    <style>
      /* Boot splash (preloader) — shown instantly before the app JS loads,
         then dismissed from src/app/main.tsx once React mounts. */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        background: #ffffff;
        transition: opacity 0.5s ease;
      }
      #app-splash.is-hidden { opacity: 0; pointer-events: none; }
      #app-splash .splash-logo {
        width: 190px;
        max-width: 56vw;
        height: auto;
        animation: splash-pulse 1.5s ease-in-out infinite;
      }
      #app-splash .splash-spinner {
        width: 34px;
        height: 34px;
        border-radius: 9999px;
        border: 3px solid rgba(8, 39, 91, 0.15);
        border-top-color: #ff6a00;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.96); }
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .splash-logo { animation: none; }
        #app-splash .splash-spinner { animation-duration: 1.6s; }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <div id="app-splash" role="status" aria-label="Loading Fotizo">
      <img class="splash-logo" src="/fotizo-logo.webp" alt="Fotizo" width="190" />
      <div class="splash-spinner" aria-hidden="true"></div>
    </div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
