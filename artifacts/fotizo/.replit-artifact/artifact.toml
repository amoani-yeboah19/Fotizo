kind = "web"
previewPath = "/"
title = "Fotizo"
version = "1.0.0"
id = "artifacts/fotizo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22104

[services.development]
run = "pnpm --filter @workspace/fotizo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fotizo", "run", "build" ]
publicDir = "artifacts/fotizo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22104"
BASE_PATH = "/"
